<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Royal Orbit - Login</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Background image with overlay gradient */
    background: 
      linear-gradient(135deg, rgba(15,32,39,0.85), rgba(44,83,100,0.85)),
      url('https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    overflow: hidden;
    position: relative;
  }

  /* Animated bubbles behind the login */
  .bubbles {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    bottom: -100px;
    background: rgba(255, 215, 0, 0.15);
    border-radius: 50%;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    opacity: 0.6;
    filter: blur(1.5px);
  }
  /* Different sizes and speeds */
  .bubble:nth-child(1) {
    width: 60px; height: 60px; left: 10%;
    animation-name: rise;
    animation-duration: 20s;
    animation-delay: 0s;
  }
  .bubble:nth-child(2) {
    width: 40px; height: 40px; left: 25%;
    animation-name: rise;
    animation-duration: 25s;
    animation-delay: 5s;
  }
  .bubble:nth-child(3) {
    width: 80px; height: 80px; left: 40%;
    animation-name: rise;
    animation-duration: 22s;
    animation-delay: 2s;
  }
  .bubble:nth-child(4) {
    width: 50px; height: 50px; left: 60%;
    animation-name: rise;
    animation-duration: 18s;
    animation-delay: 4s;
  }
  .bubble:nth-child(5) {
    width: 70px; height: 70px; left: 75%;
    animation-name: rise;
    animation-duration: 23s;
    animation-delay: 6s;
  }
  .bubble:nth-child(6) {
    width: 30px; height: 30px; left: 85%;
    animation-name: rise;
    animation-duration: 20s;
    animation-delay: 3s;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) translateX(0);
      opacity: 0.6;
    }
    100% {
      transform: translateY(-110vh) translateX(20px);
      opacity: 0;
    }
  }

  /* Animation keyframes */
  @keyframes fadeInUp {
    0% {
      opacity: 0;
      transform: translateY(30px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  @keyframes glow {
    0%, 100% {
      text-shadow: 0 0 5px #ffd700, 0 0 15px #ffd700;
      color: #ffd700;
    }
    50% {
      text-shadow: 0 0 20px #ffec6d, 0 0 40px #ffec6d;
      color: #fff176;
    }
  }

  .login-container {
    background: rgba(255, 255, 255, 0.1);
    padding: 30px 25px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    text-align: center;
    animation: fadeInUp 0.8s ease forwards;
    position: relative;
    z-index: 1;
  }
  .logo {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 15px;
    color: #ffd700;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 0.3s;
    opacity: 0;
  }
  .logo i {
    color: #ffd700;
    animation: glow 3s ease-in-out infinite;
  }
  h1 {
    margin-bottom: 25px;
    font-weight: 600;
    font-size: 1.6rem;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 0.5s;
    opacity: 0;
  }
  label {
    display: block;
    text-align: left;
    margin-bottom: 6px;
    font-size: 0.9rem;
    font-weight: 600;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
  }
  label:nth-of-type(1) {
    animation-delay: 0.7s;
  }
  label:nth-of-type(2) {
    animation-delay: 1.1s;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    background: rgba(255 255 255 / 0.2);
    color: #fff;
    transition: background-color 0.3s, color 0.3s;
  }
  input[type="text"] {
    animation-delay: 0.8s;
  }
  input[type="password"] {
    animation-delay: 1.2s;
  }
  input[type="text"]::placeholder,
  input[type="password"]::placeholder {
    color: #ffd700aa;
  }
  input[type="text"]:focus,
  input[type="password"]:focus {
    outline: 2px solid #ffd700;
    background: #fff;
    color: #000;
  }
  button {
    width: 100%;
    background: #ffd700;
    border: none;
    padding: 14px 0;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    transition: background 0.3s ease;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 1.5s;
    box-shadow: 0 4px 12px rgba(255, 215, 0, 0.7);
  }
  button:hover {
    background: #e6c200;
    box-shadow: 0 6px 18px rgba(230, 194, 0, 0.9);
  }
  .footer-text {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #ccc;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 1.7s;
  }
  @media (max-width: 400px) {
    .login-container {
      padding: 20px 15px;
    }
  }
</style>
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>
</head>
<body>
  <!-- Bubbles background animation -->
  <div class="bubbles" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="login-container" role="main">
    <div class="logo" aria-label="Royal Orbit Logo">
      <i class="fas fa-crown"></i> Royal Orbit
    </div>
    <h1>Login to Your Account</h1>
    <form action="login.php" method="POST" autocomplete="off" aria-label="Login form">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        placeholder="Enter your username"
        aria-required="true"
      />

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        placeholder="Enter your password"
        aria-required="true"
      />
<div style="text-align: left; margin-bottom: 15px; animation: fadeInUp 1s ease forwards; animation-delay: 1.3s; opacity: 0;">
  <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
    <input type="checkbox" name="remember" style="transform: scale(1.1);" />
    Remember Me
  </label>
</div>
      <button type="submit">Login</button>
    </form>
    <p class="footer-text">© 2025 Royal Orbit Restaurant</p>
  </div>
</body>
</html>
