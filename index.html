<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Royal Orbit - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    /* Base Styles */
:root {
  --primary: #C41E3A; /* Royal red */
  --secondary: #F5E8C7; /* Cream background */
  --accent: #2E8B57; /* Leaf green */
  --text: #333333;
  --gold: #D4AF37; /* Rich gold */
  --white: #FFFFFF;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Playfair Display', serif;
  background-color: var(--secondary);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}

/* Bubbles Animation */
.bubbles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
  top: 0;
  left: 0;
}

.bubble {
  position: absolute;
  bottom: -100px;
  background: rgba(196, 30, 58, 0.1);
  border-radius: 50%;
  animation: rise 15s infinite ease-in;
}

.bubble:nth-child(1) {
  width: 40px;
  height: 40px;
  left: 10%;
  animation-duration: 8s;
}

.bubble:nth-child(2) {
  width: 20px;
  height: 20px;
  left: 20%;
  animation-duration: 5s;
  animation-delay: 1s;
}

.bubble:nth-child(3) {
  width: 50px;
  height: 50px;
  left: 35%;
  animation-duration: 7s;
  animation-delay: 2s;
}

.bubble:nth-child(4) {
  width: 80px;
  height: 80px;
  left: 50%;
  animation-duration: 11s;
  animation-delay: 0s;
}

.bubble:nth-child(5) {
  width: 35px;
  height: 35px;
  left: 55%;
  animation-duration: 6s;
  animation-delay: 1s;
}

.bubble:nth-child(6) {
  width: 45px;
  height: 45px;
  left: 65%;
  animation-duration: 8s;
  animation-delay: 3s;
}

@keyframes rise {
  0% {
    bottom: -100px;
    transform: translateX(0);
  }
  50% {
    transform: translateX(100px);
  }
  100% {
    bottom: 1080px;
    transform: translateX(-200px);
  }
}

/* Login Container */
.login-container {
  background: var(--white);
  padding: 2.5rem;
  border-radius: 15px;
  box-shadow: var(--shadow);
  width: 90%;
  max-width: 450px;
  z-index: 1;
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.8s ease-out forwards;
}

.login-container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, var(--primary), var(--gold));
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 1.5rem;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.logo i {
  color: var(--gold);
}

h1 {
  text-align: center;
  margin-bottom: 1.8rem;
  color: var(--primary);
  font-weight: 600;
  font-size: 1.8rem;
}

/* Form Styles */
form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

label {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: -12px;
}

input {
  padding: 1rem;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background-color: #f9f9f9;
}

input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.2);
  background-color: var(--white);
}

input::placeholder {
  color: #aaa;
}

button {
  background: linear-gradient(135deg, var(--primary), #A3172F);
  color: white;
  border: none;
  padding: 1rem;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  margin-top: 10px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
  background: linear-gradient(135deg, #A3172F, var(--primary));
}

button:active {
  transform: translateY(0);
}

.footer-text {
  text-align: center;
  margin-top: 2rem;
  color: #777;
  font-size: 0.9rem;
}

/* Remember Me Checkbox */
input[type="checkbox"] {
  width: auto;
  padding: 0;
  margin-right: 8px;
  accent-color: var(--primary);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive Adjustments */
@media (max-width: 480px) {
  .login-container {
    padding: 1.8rem;
  }
  
  .logo {
    font-size: 1.8rem;
  }
  
  h1 {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>
  <!-- Bubbles background animation -->
  <div class="bubbles" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="login-container" role="main">
    <div class="logo" aria-label="Royal Orbit Logo">
      <i class="fas fa-crown"></i> Royal Orbit
    </div>
    <h1>Login to Your Account</h1>
    <form action="login.php" method="POST" autocomplete="off" aria-label="Login form">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        placeholder="Enter your username"
        aria-required="true"
      />

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        placeholder="Enter your password"
        aria-required="true"
      />
<div style="text-align: left; margin-bottom: 15px; animation: fadeInUp 1s ease forwards; animation-delay: 1.3s; opacity: 0;">
  <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
    <input type="checkbox" name="remember" style="transform: scale(1.1);" />
    Remember Me
  </label>
</div>
      <button type="submit">Login</button>
    </form>
    <p class="footer-text">© 2025 Royal Orbit Restaurant</p>
  </div>
</body>
</html>
